<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Platform</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* إضافة بسيطة لضمان عمل الأزرار */
        .hidden { display: none !important; }
        #messages-box { height: 70vh; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
        .message { margin: 5px; padding: 8px; border-radius: 10px; }
        .mine { background: #dcf8c6; text-align: left; }
        .others { background: #eee; text-align: right; }
    </style>
</head>
<body>

    <div id="chat-header">
        <h3 id="chat-title">الشات الجماعي</h3>
        <button id="audioCallBtn">📞 صوت</button>
        <button id="videoCallBtn">📹 فيديو</button>
    </div>

    <div id="messages-box"></div>

    <div class="chat-input-bar">
        <button id="voiceBtn">🎤</button>
        <button id="imageBtn" onclick="document.getElementById('send-image').click()">📷</button>
        <input type="file" id="send-image" class="hidden" accept="image/*">
        
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        
        <button id="emojiBtn">😀</button>
        <button id="send-btn">إرسال</button>
    </div>

    <script src="client.js"></script>
</body>
</html>
