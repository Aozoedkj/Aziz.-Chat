<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منصة الدردشة المستقرة</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
            direction: rtl;
        }
        .hidden { display: none !important; }

        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; 
            width: 100%; 
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }

        /* 🔝 الهيدر العلوي */
        #chat-header { 
            background: #1e293b; 
            padding: 10px 15px; 
            font-weight: bold; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
            height: 50px;
            box-sizing: border-box;
            z-index: 25;
        }
        #call-actions { display: flex; gap: 8px; }
        .call-btn { border: none; padding: 5px 12px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; }
        .audio-btn { background: #10b981; }
        .video-btn { background: #8b5cf6; }

        /* 📱 شريط الملاحة العلوي */
        .sidebar-menu { 
            height: 50px; 
            width: 100%; 
            background: #1e293b; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-bottom: 2px solid #334155;
            z-index: 25; 
            padding: 0;
        }
        .menu-item { 
            flex: 1;
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 22px; 
            cursor: pointer; 
            color: #94a3b8; 
            position: relative;
        }
        .menu-item.active { color: #38bdf8; }
        .menu-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 3px;
            background: #38bdf8;
            border-radius: 3px 3px 0 0;
        }
        .logout { color: #f43f5e; }

        /* مساحة الفيديو عند الاتصال */
        #video-container { background: #000; padding: 8px; text-align: center; z-index: 21; }
        .video-box { display: flex; gap: 8px; justify-content: center; }
        video { width: 110px; height: 85px; background: #222; border-radius: 8px; object-fit: cover; }
        #endCallBtn { background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 20px; margin-top: 5px; cursor: pointer; }

        /* 🌐 واجهة الدردشة المرنة */
        .chat-area { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            background: #0f172a;
            position: relative;
        }

        #messages-box { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #0f172a;
        }
        .message { background: #1e293b; color: white; padding: 10px 14px; border-radius: 16px 16px 0px 16px; max-width: 75%; align-self: flex-start; font-size: 14px; word-break: break-word; line-height: 1.4; }
        .message.mine { background: #0284c7; align-self: flex-end; border-radius: 16px 16px 16px 0px; }

        /* 🔒 شريط الكتابة السفلي الشامل (المايك، الكاميرا، النص، الإيموجي، الإرسال) */
        .chat-input-bar { 
            background: #1e293b; 
            padding: 10px; 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            border-top: 1px solid #334155;
            height: 60px;
            box-sizing: border-box;
            width: 100%;
        }
        .chat-input-bar input { flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        .tool-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 4px; color: #94a3b8; display: flex; align-items: center; }
        .send-btn { background: #0284c7; color: white; border: none; padding: 8px 18px; border-radius: 24px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* 👤+👥 الواجهات الفرعية المخصصة لقوائم العرض والملف الشخصي */
        .sub-sidebar { 
            position: absolute;
            top: 100px; 
            left: 0;
            right: 0;
            bottom: 0; 
            background: #0f172a; 
            box-sizing: border-box; 
            overflow-y: auto; 
            z-index: 30; 
            color: white;
            display: none; 
        }
        .sub-sidebar h3 { margin: 0; padding: 15px; border-bottom: 1px solid #334155; color: #38bdf8; background: #1e293b; font-size: 16px; }

        /* ✨ تنسيق شبكة الأصدقاء المتصلين الثلاثية الاحترافية */
        #users-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }
        .user-grid-card {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #1e293b;
            overflow: hidden;
            cursor: pointer;
        }
        .user-grid-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-grid-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            padding: 6px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .user-grid-info .name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .user-grid-info .age { font-size: 10px; color: #cbd5e1; margin-top: 2px; }
        .online-badge { position: absolute; top: 8px; right: 8px; width: 10px; height: 10px; background: #10b981; border-radius: 50%; border: 1.5px solid #0f172a; z-index: 5; }

        /* قائمة المحادثات الجارية والملف الشخصي */
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; background: #1e293b; margin: 10px; cursor: pointer; }
        .chat-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .avatar-large { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; display: block; margin: 15px auto; border: 2px solid #38bdf8; }
        .sub-sidebar input[type="text"] { width: calc(100% - 30px); padding: 12px; margin: 12px 15px 0px 15px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="chat-header">
            <span id="chat-title">الشات الجماعي للرفاق</span>
            <div id="call-actions">
                <button class="call-btn audio-btn" id="audioCallBtn">📞 صوت</button>
                <button class="call-btn video-btn" id="videoCallBtn">📹 فيديو</button>
            </div>
        </div>

        <div class="sidebar-menu">
            <div class="menu-item active" id="nav-group" onclick="navigateTo('group')">🌐</div>
            <div class="menu-item" id="nav-chats" onclick="navigateTo('chats')">💬</div>
            <div class="menu-item" id="nav-users" onclick="navigateTo('users')">👥</div>
            <div class="menu-item" id="nav-profile" onclick="navigateTo('profile')">👤</div>
            <div class="menu-item logout" id="logoutBtn" onclick="handleLogout()">🚪</div>
        </div>

        <div id="video-container" class="hidden">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <button id="endCallBtn">قطع الاتصال</button>
        </div>
        
        <div class="chat-area" id="main-chat-screen">
            <div id="messages-box"></div>
            
            <div class="chat-input-bar">
                <button class="tool-btn" id="voiceBtn">🎤</button>
                
                <button class="tool-btn" id="imageBtn" onclick="document.getElementById('send-image').click()">📷</button>
                <input type="file" id="send-image" accept="image/*" class="hidden">
                
                <input type="text" id="msg-input" placeholder="اكتب عبارة...">
                
                <button class="tool-btn" id="emojiBtn" onclick="document.getElementById('msg-input').value += '😀'">😀</button>
                
                <button class="send-btn" id="send-btn" onclick="sendMessageDirectly()">إرسال</button> 
            </div>
        </div>

        <div class="sub-sidebar" id="screen-users">
            <h3>الأصدقاء المتصلين</h3>
            <div id="users-list"></div>
        </div>

        <div class="sub-sidebar" id="screen-chats">
            <h3>المحادثات الحالية</h3>
            <div id="active-chats-list"></div>
        </div>

        <div class="sub-sidebar" id="screen-profile">
            <h3>الملف الشخصي</h3>
            <img class="avatar-large" id="prof-avatar" src="https://via.placeholder.com/90">
            <input type="file" id="update-avatar" class="hidden" accept="image/*">
            <button style="width:calc(100% - 30px); margin:10px 15px; padding:6px; background:#334155; border:none; color:white; border-radius:6px; cursor:pointer;" onclick="document.getElementById('update-avatar').click()">تغيير الصورة</button>
            
            <input type="text" id="prof-name" placeholder="الاسم الكامل">
            <input type="text" id="prof-birth" placeholder="العمر (مثال: 16-17 أو 22)">
            
            <button style="width:calc(100% - 30px); margin:15px 15px 0 15px; padding:12px; background:#0284c7; border:none; color:white; border-radius:8px; font-weight:bold; cursor:pointer;" id="saveProfileBtn">حفظ التعديلات</button>
        </div>

    </div>

    <script>
        let currentChatTarget = 'group'; 

        function navigateTo(target) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('screen-profile').style.display = 'none';
            document.getElementById('screen-users').style.display = 'none';
            document.getElementById('screen-chats').style.display = 'none';
            document.getElementById('main-chat-screen').style.display = 'none';

            if (target === 'group') {
                currentChatTarget = 'group';
                document.getElementById('main-chat-screen').style.display = 'flex';
                document.getElementById('nav-group').classList.add('active');
                document.getElementById('chat-title').innerText = "الشات الجماعي للرفاق";
                scrollToBottom();
            } else {
                document.getElementById(`screen-${target}`).style.display = 'block';
                document.getElementById(`nav-${target}`).classList.add('active');
            }
        }

        function handleLogout() {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
                localStorage.clear();
                window.location.href = "/";
            }
        }

        function scrollToBottom() {
            const box = document.getElementById('messages-box');
            if(box) box.scrollTop = box.scrollHeight;
        }

        document.getElementById('msg-input').addEventListener('focus', () => {
            setTimeout(scrollToBottom, 300);
        });

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessageDirectly();
        });
    </script>
    <script src="client.js"></script>
</body>
</html>
