<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدردشة - ساحة الأصدقاء</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="sidebar-menu">
            <div class="menu-item active" id="btn-profile" onclick="switchTab('profile')">👤<span class="tooltip">الملف الشخصي</span></div>
            <div class="menu-item" id="btn-users" onclick="switchTab('users')">👥<span class="tooltip">المستخدمين</span></div>
            <div class="menu-item" id="btn-chats" onclick="switchTab('chats')">💬<span class="tooltip">الدردشات</span></div>
            <div class="menu-item" id="btn-group" onclick="switchTab('group')">🌐<span class="tooltip">الشات الجماعي</span></div>
            <div class="menu-item logout" onclick="logout()">🚪<span class="tooltip">خروج</span></div>
        </div>

        <div class="sub-sidebar">
            <div id="tab-profile" class="tab-content">
                <h3>تعديل الملف الشخصي</h3>
                <img id="prof-avatar" class="avatar-large" src="https://via.placeholder.com/100">
                <input type="file" id="update-avatar" accept="image/*" onchange="previewUpdateAvatar(event)">
                <input type="text" id="prof-name" placeholder="الاسم الكامل">
                <input type="date" id="prof-birth">
                <button onclick="updateProfile()">حفظ التعديلات</button>
            </div>

            <div id="tab-users" class="tab-content hidden">
                <h3>الأصدقاء المسجلين</h3>
                <div id="users-list"></div>
            </div>

            <div id="tab-chats" class="tab-content hidden">
                <h3>المحادثات المفتوحة</h3>
                <div id="active-chats-list"></div>
            </div>

            <div id="tab-group" class="tab-content hidden">
                <h3>غرفة دردشة الأصدقاء</h3>
                <p style="color:#65676b; font-size:13px; line-height:1.5;">شات عام مفتوح يجمع كل الحسابات المسجلة بالموقع، كل ما يكتب هنا يظهر لجميع الأصدقاء بشكل مباشر.</p>
            </div>
        </div>

        <div class="chat-area">
            <div id="chat-header">
                <span id="chat-title">اختر صديقاً لبدء الحديث</span>
                <div id="call-actions" class="hidden">
                    <button class="call-btn audio-btn" id="audioCallBtn">📞 صوت</button>
                    <button class="call-btn video-btn" id="videoCallBtn">📹 فيديو</button>
                </div>
            </div>
            
            <div id="video-container" class="hidden">
                <video id="localVideo" autoplay muted playsinline></video>
                <video id="remoteVideo" autoplay playsinline></video>
                <button id="endCallBtn" onclick="endCall()">قطع الاتصال</button>
            </div>

            <div id="messages-box"></div>
            
            <div class="chat-input-bar">
                <button class="tool-btn" title="رسالة صوتية (فوكال)" onclick="triggerAudioRecord()">🎤</button>
                <button class="tool-btn" title="إرسال صورة" onclick="document.getElementById('send-image').click()">📷</button>
                <input type="file" id="send-image" accept="image/*" class="hidden" onchange="sendImageMessage(event)">
                <input type="text" id="msg-input" placeholder="اكتب عبارة...">
                <button class="tool-btn" title="إيموجي سريع" onclick="document.getElementById('msg-input').value += '😀'">😀</button>
                <button class="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <div id="user-modal" class="modal hidden">
        <div class="modal-content">
            <img id="modal-avatar" src="">
            <h2 id="modal-name"></h2>
            <p id="modal-age"></p>
            <button class="action-btn" id="modal-chat-btn">بدء الدردشة الحالية</button>
            <button class="close-btn" onclick="closeModal()">إغلاق النافذة</button>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
